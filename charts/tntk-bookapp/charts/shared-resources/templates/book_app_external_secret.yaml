apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bookapp-external-secret
spec:
  refreshInterval: "15s"  # Added refresh interval
  secretStoreRef:
    name: parameterstore
    kind: ClusterSecretStore
  target:
    name: bookapp-secret
    creationPolicy: Owner  # Added creation policy
    template:
      engineVersion: v2  # Added engine version
      data:
        .env: |
          POSTGRES_USER={{ index . "rds_username" }}
          POSTGRES_PASSWORD={{ index . "rds_password" }}
          POSTGRES_DB={{ index . "rds_db_name" }}
          POSTGRES_HOST={{ index . "rds_endpoint" }}
          DATABASE_URL=postgresql://{{ index . "rds_username" }}:{{ index . "rds_password" }}@{{ index . "rds_endpoint" }}/{{ index . "rds_db_name" }}
          POSTGRES_PORT=5432
          REDIS_HOST={{ index . "redis_host" }}
          RABBITMQ_HOST={{ index . "rabbitmq_host" }}
          RABBITMQ_USERNAME={{ index . "rabbitmq_username" }}
          RABBITMQ_PASSWORD={{ index . "rabbitmq_password" }}
  data:
    - secretKey: rds_username
      remoteRef:
        key: /dev/rds/username
    - secretKey: rds_password
      remoteRef:
        key: /dev/rds/password
    - secretKey: rds_db_name
      remoteRef:
        key: /dev/rds/db_name
    - secretKey: rds_endpoint
      remoteRef:
        key: /dev/rds/endpoint
    - secretKey: redis_host
      remoteRef:
        key: /dev/redis/endpoint
    - secretKey: rabbitmq_host
      remoteRef:
        key: /dev/rabbitmq/endpoint
    - secretKey: rabbitmq_username
      remoteRef:
        key: /dev/rabbitmq/username
    - secretKey: rabbitmq_password
      remoteRef:
        key: /dev/rabbitmq/password
