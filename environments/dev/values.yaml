  image:
    repository: "038891198925.dkr.ecr.us-east-2.amazonaws.com/dev/tntk-orders"
    pullPolicy: IfNotPresent
    tag: "d787f2d7b0edfb61a34109a6fd6da9528d348428"
  serviceAccount:
    create: true
  service:
    type: ClusterIP
    port: 80
  resources: {}
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  postgresql:
    host: postgres
    port: 5432
    username: postgres
    password: postgres
    database: postgres
  redis:
    host: redis
  rabbitmq:
    host: rabbitmq
