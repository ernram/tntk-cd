# Specific settings for each sub-chart
tntk-web:
  fullnameOverride: "tntk-web-dev"
  replicaCount: 1
  image:
    repository: "038891198925.dkr.ecr.us-east-2.amazonaws.com/dev/tntk-web"
    pullPolicy: IfNotPresent
    tag: ""
  serviceAccount:
    create: true
  service:
    type: ClusterIP
    port: 80
  resources: {}
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  configmapData:
    PORT: "80"
  ingress:
    enabled: true
    className: ""
    annotations: {}
    hosts:
      - host: "tntk-bookapp.ernestdevops.net"
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []

