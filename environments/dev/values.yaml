# Specific settings for each sub-chart
tntk-web:
  fullnameOverride: "web"
  replicaCount: 1
  image:
    repository: nginx
    pullPolicy: IfNotPresent
    tag: "cad0ce8a9673cff970af063b6e3a6458f30b2271"
  serviceAccount:
    create: false
  service:
    type: ClusterIP
    port: 80
  resources: {}
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  configmapData:
    PORT: "80"
  ingress:
    enabled: true
    className: ""
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []
tntk-orders:
  fullnameOverride: "orders"
  replicaCount: 1
  image:
    repository: nginx
    pullPolicy: IfNotPresent
    tag: "d787f2d7b0edfb61a34109a6fd6da9528d348428"
  serviceAccount:
    create: false
  service:
    type: ClusterIP
    port: 80
  resources: {}
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  postgresql:
    host: postgres
    port: 5432
    username: postgres
    password: postgres
    database: postgres
  redis:
    host: redis
  rabbitmq:
    host: rabbitmq
